name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  anchor:
    name: Anchor build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "programs -> target"

      - name: Install Solana CLI
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Install Anchor CLI
        run: cargo install --git https://github.com/coral-xyz/anchor anchor-cli --locked --force

      - name: Build programs
        working-directory: programs
        run: anchor build

      - name: Run Anchor litesvm tests
        working-directory: programs
        run: |
          cargo test -p tourchain_reputation
          cargo test -p tourchain_escrow
          cargo test -p tourchain_proof

  web:
    name: Next.js typecheck, build & vitest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
      SUPABASE_SERVICE_ROLE_KEY: placeholder_service_role
      NEXT_PUBLIC_ADMIN_PUBKEY: 11111111111111111111111111111111
      NEXT_PUBLIC_SOLANA_RPC: https://api.devnet.solana.com
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Unit tests (vitest)
        run: npm test

      - name: Build
        run: npm run build
